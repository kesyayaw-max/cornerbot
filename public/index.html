<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cosmic Corner • Voice Leaderboard</title>
<meta name="description" content="Papan peringkat voice chat Cosmic Corner Bot" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#05060f;
    --bg-1:#0a0d1f;
    --bg-2:#10142b;
    --card:#0f1329cc;
    --card-border:rgba(255,255,255,0.08);
    --text-0:#f5f6fb;
    --text-1:#aab0d1;
    --text-2:#6b7099;
    --accent-1:#7c3aed;
    --accent-2:#22d3ee;
    --accent-3:#f472b6;
    --gold:#facc15;
    --silver:#cbd5e1;
    --bronze:#f0a35a;
    --success:#4ade80;
    --danger:#fb7185;
    --radius-lg:24px;
    --radius-md:16px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter', system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(124,58,237,0.35), transparent 60%),
      radial-gradient(1000px 700px at 100% 0%, rgba(34,211,238,0.20), transparent 55%),
      radial-gradient(900px 700px at 50% 120%, rgba(244,114,182,0.15), transparent 60%),
      var(--bg-0);
    color:var(--text-0);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5) 1px, transparent 0),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.35) 1px, transparent 0),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,255,255,0.3) 1px, transparent 0),
      radial-gradient(1px 1px at 90% 20%, rgba(255,255,255,0.4) 1px, transparent 0),
      radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.3) 1px, transparent 0);
    background-size: 600px 600px;
    opacity:0.6;
    pointer-events:none;
    z-index:0;
  }
  .wrap{
    position:relative;
    z-index:1;
    max-width:1080px;
    margin:0 auto;
    padding:48px 24px 80px;
  }

  /* Header */
  header{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:14px;
    margin-bottom:48px;
  }
  .logo-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 16px;
    border-radius:999px;
    background:linear-gradient(135deg, rgba(124,58,237,0.25), rgba(34,211,238,0.15));
    border:1px solid rgba(255,255,255,0.12);
    font-size:13px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-1);
    font-weight:600;
  }
  .logo-badge .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--success);
    box-shadow:0 0 10px var(--success);
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:0.5; transform:scale(0.8);}
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:clamp(32px, 6vw, 56px);
    font-weight:700;
    margin:0;
    line-height:1.05;
    background:linear-gradient(120deg, #ffffff 10%, #b9c2ff 40%, #7c3aed 70%, #22d3ee 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    letter-spacing:-0.02em;
  }
  header p{
    color:var(--text-1);
    font-size:15px;
    max-width:520px;
    margin:0;
  }

  /* Status / meta bar */
  .meta-bar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:6px;
    font-size:13px;
    color:var(--text-2);
  }
  .meta-bar span{
    display:inline-flex;
    align-items:center;
    gap:6px;
  }

  /* Insights row */
  .insights{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
    margin-bottom:40px;
  }
  .insight-card{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:var(--radius-md);
    padding:20px;
    backdrop-filter: blur(20px);
    position:relative;
    overflow:hidden;
  }
  .insight-card::after{
    content:'';
    position:absolute;
    inset:-40% -40% auto auto;
    width:120px;height:120px;
    background:radial-gradient(circle, var(--glow, rgba(124,58,237,0.4)), transparent 70%);
    filter:blur(10px);
  }
  .insight-card .label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text-2);
    font-weight:600;
    margin-bottom:8px;
  }
  .insight-card .value{
    font-family:'Space Grotesk', sans-serif;
    font-size:26px;
    font-weight:700;
  }
  .insight-card.time{--glow:rgba(124,58,237,0.45);}
  .insight-card.xp{--glow:rgba(34,211,238,0.4);}
  .insight-card.coins{--glow:rgba(250,204,21,0.4);}

  /* Podium */
  .podium{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:16px;
    align-items:end;
    margin-bottom:44px;
  }
  .podium-card{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:var(--radius-lg);
    padding:24px 16px 20px;
    text-align:center;
    backdrop-filter: blur(20px);
    position:relative;
    transition:transform 0.25s ease;
  }
  .podium-card:hover{ transform:translateY(-4px); }
  .podium-card.rank-1{
    order:2;
    padding-top:32px;
    border-color:rgba(250,204,21,0.5);
    box-shadow:0 0 0 1px rgba(250,204,21,0.15), 0 20px 60px -20px rgba(250,204,21,0.35);
  }
  .podium-card.rank-2{ order:1; box-shadow:0 20px 50px -25px rgba(203,213,225,0.3); }
  .podium-card.rank-3{ order:3; box-shadow:0 20px 50px -25px rgba(240,163,90,0.3); }
  .medal{
    font-size:34px;
    display:block;
    margin-bottom:8px;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.4));
  }
  .avatar{
    width:64px;height:64px;
    border-radius:50%;
    margin:0 auto 12px;
    display:block;
    object-fit:cover;
    border:2px solid rgba(255,255,255,0.15);
    background:var(--bg-2);
  }
  .podium-card.rank-1 .avatar{ width:84px; height:84px; border-color:rgba(250,204,21,0.6); }
  .podium-name{
    font-weight:700;
    font-size:15px;
    margin-bottom:4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .podium-time{
    font-family:'Space Grotesk', sans-serif;
    font-size:20px;
    font-weight:700;
    color:var(--text-0);
    margin-bottom:6px;
  }
  .podium-sub{
    font-size:12px;
    color:var(--text-2);
  }

  /* List */
  .list-section h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:20px;
    font-weight:600;
    margin:0 0 16px;
    color:var(--text-0);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .row{
    display:grid;
    grid-template-columns:44px 40px 1fr auto auto;
    align-items:center;
    gap:16px;
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:var(--radius-md);
    padding:12px 18px;
    backdrop-filter: blur(16px);
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .row:hover{
    background:rgba(255,255,255,0.04);
    transform:translateX(2px);
  }
  .row .rank-num{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:16px;
    color:var(--text-2);
    text-align:center;
  }
  .row .avatar-sm{
    width:36px;height:36px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(255,255,255,0.1);
    background:var(--bg-2);
  }
  .row .name{
    font-weight:600;
    font-size:14.5px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .row .time-val{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:14.5px;
    color:var(--text-0);
    text-align:right;
  }
  .row .xp-val{
    font-size:12.5px;
    color:var(--text-2);
    text-align:right;
    min-width:80px;
  }

  /* States */
  .state-box{
    text-align:center;
    padding:60px 20px;
    color:var(--text-1);
  }
  .state-box .emoji{ font-size:42px; display:block; margin-bottom:14px; }
  .spinner{
    width:34px;height:34px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.15);
    border-top-color:var(--accent-2);
    margin:0 auto 16px;
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  footer{
    text-align:center;
    margin-top:60px;
    color:var(--text-2);
    font-size:12.5px;
  }

  @media (max-width:640px){
    .insights{ grid-template-columns:1fr; }
    .podium{ grid-template-columns:1fr; }
    .podium-card.rank-1, .podium-card.rank-2, .podium-card.rank-3{ order:initial; }
    .row{ grid-template-columns:32px 32px 1fr auto; }
    .row .xp-val{ display:none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="logo-badge"><span class="dot"></span> Cosmic Corner Bot</span>
      <h1>Voice Leaderboard</h1>
      <p>Peringkat member paling aktif nongkrong di voice channel. Update otomatis tiap beberapa detik.</p>
      <div class="meta-bar">
        <span id="statusText">⏳ Menghubungkan...</span>
        <span>•</span>
        <span id="updatedAt">-</span>
      </div>
    </header>

    <div id="content">
      <div class="state-box">
        <div class="spinner"></div>
        Memuat data leaderboard...
      </div>
    </div>

    <footer>Cosmic Corner Bot • Voice Tracker Dashboard</footer>
  </div>

<script>
  const REFRESH_MS = 15000;
  const content = document.getElementById('content');
  const statusText = document.getElementById('statusText');
  const updatedAtEl = document.getElementById('updatedAt');

  function escapeHtml(str){
    return String(str ?? '').replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function fallbackAvatar(name){
    const initial = (name || '?').trim().charAt(0).toUpperCase() || '?';
    const colors = ['#7c3aed','#22d3ee','#f472b6','#facc15','#4ade80'];
    const color = colors[Math.abs(hashCode(name||'x')) % colors.length];
    return `data:image/svg+xml;utf8,${encodeURIComponent(
      `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" fill="${color}" rx="40"/><text x="50%" y="54%" font-family="Arial" font-size="34" fill="white" text-anchor="middle" dominant-baseline="middle">${initial}</text></svg>`
    )}`;
  }

  function hashCode(str){
    let hash = 0;
    for (let i = 0; i < str.length; i++){
      hash = (hash << 5) - hash + str.charCodeAt(i);
      hash |= 0;
    }
    return hash;
  }

  function avatarSrc(entry){
    return entry.avatar || fallbackAvatar(entry.name);
  }

  function formatUpdatedAt(iso){
    if (!iso) return '-';
    try {
      const d = new Date(iso);
      return `Update terakhir: ${d.toLocaleTimeString('id-ID', { hour: '2-digit', minute:'2-digit', second:'2-digit' })}`;
    } catch { return '-'; }
  }

  function render(data){
    const podium = data.podium || [];
    const rest = (data.leaderboard || []).slice(3);
    const insights = data.insights || {};

    const podiumHtml = podium.length ? `
      <div class="podium">
        ${podium.map(p => `
          <div class="podium-card rank-${p.rank}">
            <span class="medal">${p.medal}</span>
            <img class="avatar" src="${avatarSrc(p)}" alt="${escapeHtml(p.name)}" onerror="this.src='${fallbackAvatar(p.name)}'"/>
            <div class="podium-name" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</div>
            <div class="podium-time">${escapeHtml(p.time)}</div>
            <div class="podium-sub">${(p.xp||0).toLocaleString('id-ID')} XP • ${(p.coins||0).toLocaleString('id-ID')} coin</div>
          </div>
        `).join('')}
      </div>
    ` : '';

    const listHtml = rest.length ? `
      <div class="list-section">
        <h2>📋 Peringkat Lainnya</h2>
        <div class="list">
          ${rest.map(u => `
            <div class="row">
              <div class="rank-num">#${u.rank}</div>
              <img class="avatar-sm" src="${avatarSrc(u)}" alt="" onerror="this.src='${fallbackAvatar(u.name)}'"/>
              <div class="name" title="${escapeHtml(u.name)}">${escapeHtml(u.name)}</div>
              <div class="time-val">${escapeHtml(u.time)}</div>
              <div class="xp-val">${(u.xp||0).toLocaleString('id-ID')} XP</div>
            </div>
          `).join('')}
        </div>
      </div>
    ` : '';

    const emptyHtml = (!podium.length && !rest.length) ? `
      <div class="state-box">
        <span class="emoji">🎧</span>
        Belum ada aktivitas voice yang tercatat.<br/>Yuk nongkrong dulu di voice channel!
      </div>
    ` : '';

    content.innerHTML = `
      <div class="insights">
        <div class="insight-card time">
          <div class="label">⏱️ Waktu Terbanyak</div>
          <div class="value">${escapeHtml(insights.topTime || '0j 0m')}</div>
        </div>
        <div class="insight-card xp">
          <div class="label">✨ XP Tertinggi</div>
          <div class="value">${(insights.topXp||0).toLocaleString('id-ID')}</div>
        </div>
        <div class="insight-card coins">
          <div class="label">💰 Coin Tertinggi</div>
          <div class="value">${(insights.topCoins||0).toLocaleString('id-ID')}</div>
        </div>
      </div>
      ${podiumHtml}
      ${listHtml}
      ${emptyHtml}
    `;
  }

  function renderError(message){
    content.innerHTML = `
      <div class="state-box">
        <span class="emoji">⚠️</span>
        ${escapeHtml(message)}
      </div>
    `;
  }

  async function load(){
    try {
      const res = await fetch('/api/leaderboard/voice', { cache: 'no-store' });
      const data = await res.json();

      if (!data.ok) {
        statusText.textContent = '🔴 ' + (data.error || 'Gagal memuat data');
        renderError(data.error || 'Server belum siap. Coba lagi sebentar.');
        return;
      }

      statusText.textContent = '🟢 Live';
      updatedAtEl.textContent = formatUpdatedAt(data.updatedAt);
      render(data);
    } catch (err) {
      statusText.textContent = '🔴 Gagal terhubung ke server';
      renderError('Tidak bisa menghubungi API. Pastikan bot sedang online.');
    }
  }

  load();
  setInterval(load, REFRESH_MS);
</script>
</body>
</html>
